<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진의 신비한 정원</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="maple_dice.css">
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="ho">✦</div>
    <h1>진의 신비한 정원</h1>
    <div class="sub">주사위 최적 경로 계산기</div>
    <div class="hl"></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('play')">🎲 플레이</button>
    <button class="tab" onclick="switchTab('settings')">⚙️ 보드 설정</button>
  </div>

  <!-- PLAY TAB -->
  <div id="tab-play" class="page active">

    <!-- 상단: 보드 + 우측 패널 2단 레이아웃 -->
    <div class="play-layout">

      <!-- 왼쪽: 보드 -->
      <div class="board-col">
        <div class="pos-bar">
          <div><div class="plabel">현재 위치</div><div class="pval" id="posDisplay">1번 칸 (START)</div></div>
          <div class="legend">
            <div class="li"><div class="ld ld-plus"></div>+이동</div>
            <div class="li"><div class="ld ld-minus"></div>-이동</div>
            <div class="li"><div class="ld ld-myst"></div>?칸</div>
            <div class="li"><div class="ld ld-path"></div>최적경로</div>
            <div class="li"><div class="ld ld-cur"></div>현재위치</div>
          </div>
        </div>
        <div class="board-grid" id="boardGrid"></div>
      </div>

      <!-- 오른쪽: 주사위 + 버튼 + 결과 -->
      <div class="side-col">
        <div class="section">
          <div class="sh"><div class="si">🎲</div><div class="st">주사위 선택</div></div>
          <div class="dc" id="diceContainer"></div>
        </div>
        <button class="calc-btn" onclick="calculate()">✦ 계산 ✦</button>
        <div class="section results-section" id="resultsSection">
          <div class="sh"><div class="si">🏆</div><div class="st">최적 경로</div></div>
          <div class="mgrid">
            <div class="mc hl"><div class="ml">최고 코인</div><div class="mv gold" id="bestCoin">—</div></div>
            <div class="mc"><div class="ml">최적 순서</div><div class="mv sm" id="bestOrder">—</div></div>
            <div class="mc"><div class="ml">도착 칸</div><div class="mv" id="bestPos">—</div></div>
            <div class="mc"><div class="ml">경우의 수</div><div class="mv" id="totalCases">—</div></div>
          </div>
          <div id="resultList"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="tab-settings" class="page">
    <div class="section" style="margin:12px">
      <div class="sh"><div class="si">💰</div><div class="st">칸별 코인 보상 수정</div></div>
      <div class="notice">각 칸의 코인 보상을 수정하세요. 특수 칸은 아래에서 설정합니다.</div>
      <div class="cell-edit-grid" id="cellEditGrid"></div>
    </div>
    <div class="section" style="margin:12px">
      <div class="sh"><div class="si">✨</div><div class="st">특수 칸 설정</div></div>
      <div class="notice">주마다 바뀌는 이동칸·?칸을 여기서 관리하세요.</div>
      <div class="special-list" id="specialList"></div>
      <button class="add-btn" onclick="addSpecialCell()">+ 특수 칸 추가</button>
      <div class="save-notice" id="saveNotice">✓ 저장되었습니다</div>
    </div>
  </div>

</div>
<script src="maple_dice.js"></script>
</body>
</html>
