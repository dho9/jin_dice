<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>진의 신비한 정원</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f0ff;--bg2:#ede8ff;--bg3:#e4dcff;--card:#ffffff;--card2:#f0ebff;
  --border:rgba(140,100,220,0.20);--border2:rgba(140,100,220,0.40);
  --accent:#7c4dcc;--accent2:#9c6de0;
  --gold:#c8800a;--gold2:#a86000;
  --green:#1a9e60;--red:#d03050;
  --cyan:#0098c8;--orange:#d06010;
  --text:#2a1a50;--text2:#5a4480;--text3:#8870b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 20% 18%,rgba(255,255,255,.35) 0%,transparent 100%),radial-gradient(1px 1px at 78% 12%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 50% 88%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(2px 2px at 88% 62%,rgba(178,138,248,.4) 0%,transparent 100%)}
.app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 0 60px}
.header{text-align:center;padding:20px 20px 12px}
.ho{font-size:20px;margin-bottom:4px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.header h1{font-family:'Gowun Batang',serif;font-size:19px;font-weight:700;color:var(--accent);text-shadow:0 0 25px rgba(178,138,248,.5);letter-spacing:.05em;margin-bottom:2px}
.header .sub{font-size:10px;color:var(--text3);letter-spacing:.08em}
.hl{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:7px auto 0;opacity:.4}
.tabs{display:flex;gap:0;margin:0 12px 12px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text3);border:none;transition:all .2s;letter-spacing:.03em}
.tab.active{background:var(--card2);color:var(--accent);border-bottom:2px solid var(--accent)}
.tab:hover:not(.active){color:var(--text2);background:var(--card)}
.section{margin:0 12px 12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:13px;box-shadow:0 0 10px rgba(178,138,248,.07)}
.sh{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.si{width:22px;height:22px;border-radius:6px;background:rgba(178,138,248,.12);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px}
.st{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.page{display:none}
.page.active{display:block}
.board-wrap{padding:0 12px 12px}
.pos-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:7px 12px;margin-bottom:8px}
.plabel{font-size:10px;color:var(--text2)}
.pval{font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;color:var(--accent)}
.phint{font-size:9px;color:var(--text3)}
.legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-bottom:8px}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text3)}
.ld{width:8px;height:8px;border-radius:2px}
.board-grid{display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);gap:2px;width:100%;overflow:visible}
.bc{border-radius:4px;border:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .13s;overflow:visible;padding:1px;aspect-ratio:1;min-width:0;position:relative}
.bc:hover{border-color:var(--accent2);background:var(--card2)}
.bc.cur{border:2.5px solid #7c4dcc!important;background:rgba(124,77,204,.18)!important;box-shadow:0 0 0 2px rgba(124,77,204,.35),0 0 10px rgba(124,77,204,.5)}
.bc.onpath{border-color:var(--gold2)!important;background:rgba(240,192,96,.12)!important}
/* 말(piece) */
.piece{position:absolute;top:-16px;left:50%;transform:translateX(-50%);line-height:1;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(80,30,180,.8));animation:pieceFloat 1.8s ease-in-out infinite;z-index:10}
@keyframes pieceFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
/* 계산 후 말 이동 애니메이션 */
.piece.moving{animation:piecePop .35s ease both}
@keyframes piecePop{0%{transform:translateX(-50%) scale(.5);opacity:0}60%{transform:translateX(-50%) scale(1.3)}100%{transform:translateX(-50%) scale(1);opacity:1}}
.bc.corner{background:rgba(124,92,191,.12);border-color:var(--accent2)}
.bc.inner{background:transparent;border:1px dashed rgba(178,138,248,.07);cursor:default;pointer-events:none;border-radius:0}
.bc.icenter{background:transparent;border:none;cursor:default;pointer-events:none}
.bc.move-plus{background:rgba(80,216,255,.08);border-color:rgba(80,216,255,.35)}
.bc.move-plus:hover{background:rgba(80,216,255,.15)}
.bc.move-minus{background:rgba(240,96,112,.08);border-color:rgba(240,96,112,.35)}
.bc.move-minus:hover{background:rgba(240,96,112,.15)}
.bc.mystery{background:rgba(255,144,64,.08);border-color:rgba(255,144,64,.35)}
.bc.mystery:hover{background:rgba(255,144,64,.15)}
.cn{font-size:6px;color:var(--text3);line-height:1}
.cv{font-size:7.5px;font-weight:700;line-height:1.15;text-align:center}
.cv.pos{color:var(--gold)}
.cv.movepos{color:var(--cyan);font-size:6.5px}
.cv.moveneg{color:var(--red);font-size:6.5px}
.cv.myst{color:var(--orange);font-size:10px}
.cstart{font-size:5.5px;color:var(--accent);font-weight:700;line-height:1}
.bc.cur .cn{color:var(--accent)}
.center-txt{font-family:'Gowun Batang',serif;font-size:8px;color:var(--accent);text-align:center;opacity:.5;line-height:1.5}
.notice{font-size:10px;color:var(--text3);line-height:1.5;padding:6px 9px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--accent2);margin-bottom:9px}
.dc{display:flex;flex-direction:column;gap:8px}
.dr{display:flex;align-items:center;gap:7px}
.dlabel{font-size:11px;color:var(--text3);width:44px;flex-shrink:0}
.dopts{display:flex;gap:4px;flex:1}
.dbtn{flex:1;aspect-ratio:1;max-width:42px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;line-height:1}
.dbtn:hover{border-color:var(--accent2);background:var(--card2)}
.dbtn.sel{border-color:var(--accent);background:rgba(178,138,248,.18);box-shadow:0 0 7px rgba(178,138,248,.3);color:var(--text)}
.dchosen{width:34px;height:34px;border-radius:8px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dnum{width:44px;height:36px;border-radius:9px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:16px;font-weight:700;text-align:center;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;flex-shrink:0}
.dnum:focus{border-color:var(--accent);box-shadow:0 0 6px rgba(124,77,204,.25)}
.calc-btn{width:calc(100% - 24px);margin:0 12px 12px;padding:13px;background:linear-gradient(135deg,rgba(178,138,248,.27),rgba(124,92,191,.27));border:1px solid var(--accent2);border-radius:14px;color:var(--accent);font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .2s;box-shadow:0 0 14px rgba(178,138,248,.1)}
.calc-btn:hover{background:linear-gradient(135deg,rgba(178,138,248,.42),rgba(124,92,191,.42));box-shadow:0 0 22px rgba(178,138,248,.25);transform:translateY(-1px)}
.calc-btn:active{transform:translateY(0)}
.results-section{display:none}
.results-section.visible{display:block}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.mc.hl{border-color:var(--gold2);background:rgba(240,192,96,.07)}
.ml{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.mv{font-family:'Gowun Batang',serif;font-size:16px;font-weight:700;color:var(--text)}
.mv.gold{color:var(--gold)}
.mv.sm{font-size:12px}
.ri{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px}
.ri:last-child{border-bottom:none;padding-bottom:0}
.rb{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.r1{background:rgba(240,192,96,.2);border:1px solid var(--gold2);color:var(--gold)}
.r2{background:rgba(160,155,180,.15);border:1px solid rgba(160,155,180,.35);color:#b0aac8}
.r3{background:rgba(200,148,42,.12);border:1px solid rgba(200,148,42,.28);color:#c89060}
.rn{background:var(--bg3);border:1px solid var(--border);color:var(--text3)}
.rbody{flex:1;min-width:0}
.rorder{font-size:13px;margin-bottom:2px;display:flex;align-items:center;gap:3px}
.rarr{font-size:8px;color:var(--text3)}
.rpath{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcoin{font-family:'Gowun Batang',serif;font-size:14px;font-weight:700;color:var(--green);flex-shrink:0;align-self:center}
.rcoin.neg{color:var(--red)}
.cell-edit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:6px}
.ced{display:flex;flex-direction:column;align-items:center;gap:2px}
.cel{font-size:8px;color:var(--text3);line-height:1}
.cei{width:100%;padding:4px 2px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:9px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.cei:focus{border-color:var(--accent2)}
.special-list{display:flex;flex-direction:column;gap:8px}
.special-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.special-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.special-item-title{font-size:12px;font-weight:500;color:var(--text)}
.special-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-move-plus{background:rgba(80,216,255,.15);color:var(--cyan);border:1px solid rgba(80,216,255,.3)}
.badge-move-minus{background:rgba(240,96,112,.15);color:var(--red);border:1px solid rgba(240,96,112,.3)}
.badge-mystery{background:rgba(255,144,64,.15);color:var(--orange);border:1px solid rgba(255,144,64,.3)}
.special-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.special-label{font-size:10px;color:var(--text3);min-width:52px}
.special-input{width:60px;padding:5px 6px;text-align:center;background:var(--card2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.special-input:focus{border-color:var(--accent)}
.type-btns{display:flex;gap:4px}
.type-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:10px;cursor:pointer;transition:all .13s}
.type-btn.ap{background:rgba(80,216,255,.15);border-color:rgba(80,216,255,.4);color:var(--cyan)}
.type-btn.am{background:rgba(240,96,112,.15);border-color:rgba(240,96,112,.4);color:var(--red)}
.type-btn.aq{background:rgba(255,144,64,.15);border-color:rgba(255,144,64,.4);color:var(--orange)}
.add-btn{width:100%;padding:8px;background:transparent;border:1px dashed var(--border2);border-radius:8px;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;margin-top:4px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.del-btn{width:20px;height:20px;border-radius:50%;background:rgba(240,96,112,.1);border:1px solid rgba(240,96,112,.3);color:var(--red);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s}
.del-btn:hover{background:rgba(240,96,112,.25)}
.save-notice{font-size:10px;color:var(--green);text-align:center;margin-top:6px;opacity:0;transition:opacity .3s}
.save-notice.show{opacity:1}
@keyframes pop{0%{transform:scale(.95);opacity:0}60%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .3s ease both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:3px}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="ho">✦</div>
  <h1>진의 신비한 정원</h1>
  <div class="sub">주사위 최적 경로 계산기</div>
  <div class="hl"></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('play')">🎲 플레이</button>
  <button class="tab" onclick="switchTab('settings')">⚙️ 보드 설정</button>
</div>

<!-- PLAY TAB -->
<div id="tab-play" class="page active">
  <div class="board-wrap">
    <div class="sh" style="padding:0 0 7px">
      <div class="si">🗺️</div><div class="st">현재 위치 선택</div>
    </div>
    <div class="pos-bar">
      <div><div class="plabel">현재 위치</div><div class="pval" id="posDisplay">1번 칸 (START)</div></div>
      <div class="phint">칸 탭 → 선택</div>
    </div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:rgba(80,216,255,.4)"></div>+이동칸</div>
      <div class="li"><div class="ld" style="background:rgba(240,96,112,.4)"></div>-이동칸</div>
      <div class="li"><div class="ld" style="background:rgba(255,144,64,.4)"></div>?칸</div>
      <div class="li"><div class="ld" style="background:rgba(240,192,96,.1);border:1px solid #c8942a"></div>최적경로</div>
      <div class="li"><div class="ld" style="background:rgba(178,138,248,.22);border:1px solid #b28af8"></div>현재위치</div>
    </div>
    <div class="board-grid" id="boardGrid"></div>
  </div>
  <div class="section">
    <div class="sh"><div class="si">🎲</div><div class="st">주사위 눈 선택</div></div>
    <div class="notice">눈 버튼을 탭하거나, 오른쪽 입력칸에 숫자(1~6)를 직접 입력하세요.</div>
    <div class="dc" id="diceContainer"></div>
  </div>
  <button class="calc-btn" onclick="calculate()">✦ 최적 경로 계산하기 ✦</button>
  <div class="section results-section" id="resultsSection">
    <div class="sh"><div class="si">🏆</div><div class="st">최적 경로 결과</div></div>
    <div class="mgrid">
      <div class="mc hl"><div class="ml">최고 코인 획득</div><div class="mv gold" id="bestCoin">—</div></div>
      <div class="mc"><div class="ml">최적 순서</div><div class="mv sm" id="bestOrder">—</div></div>
      <div class="mc"><div class="ml">도착 칸</div><div class="mv" id="bestPos">—</div></div>
      <div class="mc"><div class="ml">비교 경우의 수</div><div class="mv" id="totalCases">—</div></div>
    </div>
    <div id="resultList"></div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div id="tab-settings" class="page">
  <div class="section">
    <div class="sh"><div class="si">💰</div><div class="st">칸별 코인 보상 수정</div></div>
    <div class="notice">각 칸의 코인 보상을 수정하세요. 특수 칸은 아래에서 설정합니다.</div>
    <div class="cell-edit-grid" id="cellEditGrid"></div>
  </div>
  <div class="section">
    <div class="sh"><div class="si">✨</div><div class="st">특수 칸 설정</div></div>
    <div class="notice">주마다 바뀌는 이동칸·?칸을 여기서 관리하세요.</div>
    <div class="special-list" id="specialList"></div>
    <button class="add-btn" onclick="addSpecialCell()">+ 특수 칸 추가</button>
    <div class="save-notice" id="saveNotice">✓ 저장되었습니다</div>
  </div>
</div>
</div>

<script>
const TOTAL=40,FACES=['⚀','⚁','⚂','⚃','⚄','⚅'],COLS=11,ROWS=11;
let coinVals=[0,500,100,600,400,400,300,400,300,400,400,100,600,100,400,100,300,300,400,100,150,400,100,300,300,300,100,300,400,100,600,0,600,600,600,400,600,400,100,300,300];
let specialCells=[{cellNum:16,type:'move',moveVal:-3},{cellNum:23,type:'move',moveVal:3},{cellNum:31,type:'mystery',moveVal:0},{cellNum:33,type:'move',moveVal:-2}];
const PATH_POS=[null];
for(let c=10;c>=0;c--)PATH_POS.push([10,c]);
for(let r=9;r>=1;r--)PATH_POS.push([r,0]);
for(let c=0;c<=10;c++)PATH_POS.push([0,c]);
for(let r=1;r<=9;r++)PATH_POS.push([r,10]);
const CORNERS=new Set([1,11,21,31]);
let currentPos=1,chosenDice=[6,5,4],highlightedPath=[];

function getSpecial(n){return specialCells.find(s=>s.cellNum===n)||null}
function cellArrow(i){if(i<=11)return'◀';if(i<=20)return'▲';if(i<=31)return'▶';return'▼'}

function renderBoard(){
  const grid=document.getElementById('boardGrid');
  grid.innerHTML='';
  const lookup={};
  for(let i=1;i<=TOTAL;i++){const[r,c]=PATH_POS[i];lookup[`${r},${c}`]=i}
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const div=document.createElement('div');
      const idx=lookup[`${r},${c}`];
      if(idx!==undefined){
        const sp=getSpecial(idx);
        const isCur=idx===currentPos,isOn=highlightedPath.includes(idx),corner=CORNERS.has(idx);
        let cls='bc';
        if(corner)cls+=' corner';
        if(isCur)cls+=' cur';else if(isOn)cls+=' onpath';
        if(sp){if(sp.type==='mystery')cls+=' mystery';else cls+=sp.moveVal>=0?' move-plus':' move-minus';}
        div.className=cls;
        let inner=`<span class="cn">${idx}</span>`;
        if(idx===1)inner+=`<span class="cstart">START</span>`;
        if(sp){
          if(sp.type==='mystery')inner+=`<span class="cv myst">?</span>`;
          else{const s=sp.moveVal>=0?'+':'';inner+=`<span class="cv ${sp.moveVal>=0?'movepos':'moveneg'}">${s}${sp.moveVal}칸</span>`;}
        }else{inner+=`<span class="cv pos">+${coinVals[idx]}</span>`;}
        if(!corner)inner+=`<span style="font-size:5px;color:var(--text3);line-height:1">${cellArrow(idx)}</span>`;
        if(isCur)inner+=`<span class="piece"><svg width="18" height="22" viewBox="0 0 18 22" xmlns="http://www.w3.org/2000/svg"><ellipse cx="9" cy="20" rx="4" ry="2" fill="rgba(100,50,200,0.3)"/><circle cx="9" cy="9" r="8" fill="#7c4dcc" stroke="white" stroke-width="2.5"/><circle cx="9" cy="9" r="4" fill="white" opacity="0.9"/></svg></span>`;
        div.innerHTML=inner;
        div.onclick=()=>{currentPos=idx;highlightedPath=[];renderBoard();document.getElementById('posDisplay').textContent=`${idx}번 칸${idx===1?' (START)':''}`};
      }else{
        if(r===5&&c===5){div.className='bc icenter';div.innerHTML=`<div class="center-txt">진의<br>신비한<br>정원</div>`;}
        else div.className='bc inner';
      }
      grid.appendChild(div);
    }
  }
}

function renderDice(){
  const c=document.getElementById('diceContainer');c.innerHTML='';
  for(let d=0;d<3;d++){
    const row=document.createElement('div');row.className='dr';
    const lbl=document.createElement('div');lbl.className='dlabel';lbl.textContent=`주사위 ${d+1}`;row.appendChild(lbl);
    const opts=document.createElement('div');opts.className='dopts';
    for(let v=1;v<=6;v++){
      const btn=document.createElement('button');btn.className='dbtn'+(chosenDice[d]===v?' sel':'');btn.textContent=FACES[v-1];
      btn.onclick=()=>{chosenDice[d]=v;renderDice()};opts.appendChild(btn);
    }
    row.appendChild(opts);
    // 숫자 직접 입력
    const numIn=document.createElement('input');
    numIn.type='number';numIn.className='dnum';numIn.min=1;numIn.max=6;numIn.value=chosenDice[d];
    numIn.oninput=()=>{
      const v=Math.max(1,Math.min(6,parseInt(numIn.value)||1));
      chosenDice[d]=v;
      // 버튼만 업데이트 (포커스 유지위해 전체 re-render 안함)
      row.querySelectorAll('.dbtn').forEach((b,i)=>b.classList.toggle('sel',i+1===v));
    };
    numIn.onblur=()=>{numIn.value=chosenDice[d]};
    row.appendChild(numIn);
    c.appendChild(row);
  }
}

function renderCellEdit(){
  const grid=document.getElementById('cellEditGrid');grid.innerHTML='';
  for(let i=1;i<=TOTAL;i++){
    const sp=getSpecial(i);
    const div=document.createElement('div');div.className='ced';
    const lbl=document.createElement('span');lbl.className='cel';lbl.textContent=i===1?'START':`${i}번`;div.appendChild(lbl);
    if(sp){
      const badge=document.createElement('span');
      if(sp.type==='mystery'){
        badge.style='display:flex;align-items:center;justify-content:center;font-size:11px;padding:3px 0;border-radius:5px;background:rgba(255,144,64,.1);border:1px solid rgba(255,144,64,.4);color:var(--orange)';
        badge.textContent='?';
      }else{
        badge.style=`display:flex;align-items:center;justify-content:center;font-size:8px;padding:3px 1px;border-radius:5px;background:${sp.moveVal>=0?'rgba(80,216,255,.1)':'rgba(240,96,112,.1)'};border:1px solid ${sp.moveVal>=0?'rgba(80,216,255,.4)':'rgba(240,96,112,.4)'};color:${sp.moveVal>=0?'var(--cyan)':'var(--red)'}`;
        badge.textContent=(sp.moveVal>=0?'+':'')+sp.moveVal+'칸';
      }
      div.appendChild(badge);
    }else{
      const inp=document.createElement('input');inp.type='number';inp.className='cei';inp.value=coinVals[i];
      inp.onchange=()=>{coinVals[i]=parseInt(inp.value)||0;renderBoard();showSave()};
      div.appendChild(inp);
    }
    grid.appendChild(div);
  }
}

function renderSpecialList(){
  const list=document.getElementById('specialList');list.innerHTML='';
  specialCells.forEach((sp,idx)=>{
    const item=document.createElement('div');item.className='special-item';
    const hdr=document.createElement('div');hdr.className='special-item-header';
    const title=document.createElement('span');title.className='special-item-title';title.textContent=`특수 칸 #${idx+1}`;hdr.appendChild(title);
    const badge=document.createElement('span');badge.className='special-badge';
    const updateBadge=()=>{
      if(sp.type==='mystery'){badge.className='special-badge badge-mystery';badge.textContent='? 랜덤';}
      else if(sp.moveVal>=0){badge.className='special-badge badge-move-plus';badge.textContent=`+${sp.moveVal}칸 이동`;}
      else{badge.className='special-badge badge-move-minus';badge.textContent=`${sp.moveVal}칸 이동`;}
    };
    updateBadge();hdr.appendChild(badge);item.appendChild(hdr);

    const row1=document.createElement('div');row1.className='special-row';
    const nl=document.createElement('span');nl.className='special-label';nl.textContent='칸 번호';row1.appendChild(nl);
    const ni=document.createElement('input');ni.type='number';ni.className='special-input';ni.min=1;ni.max=TOTAL;ni.value=sp.cellNum;
    ni.onchange=()=>{sp.cellNum=Math.max(1,Math.min(TOTAL,parseInt(ni.value)||1));ni.value=sp.cellNum;renderBoard();renderCellEdit();showSave()};
    row1.appendChild(ni);

    const tbtns=document.createElement('div');tbtns.className='type-btns';
    const mkType=(label,cls,check,action)=>{
      const b=document.createElement('button');
      b.className='type-btn'+(check()?` ${cls}`:'');b.textContent=label;
      b.onclick=()=>{action();updateBadge();renderSpecialList();renderBoard();renderCellEdit();showSave()};
      tbtns.appendChild(b);
    };
    mkType('+이동','ap',()=>sp.type==='move'&&sp.moveVal>=0,()=>{sp.type='move';if(sp.moveVal<0)sp.moveVal=3});
    mkType('-이동','am',()=>sp.type==='move'&&sp.moveVal<0,()=>{sp.type='move';if(sp.moveVal>=0)sp.moveVal=-3});
    mkType('?','aq',()=>sp.type==='mystery',()=>{sp.type='mystery';sp.moveVal=0});
    row1.appendChild(tbtns);

    const del=document.createElement('button');del.className='del-btn';del.innerHTML='×';
    del.onclick=()=>{specialCells.splice(idx,1);renderSpecialList();renderBoard();renderCellEdit();showSave()};
    row1.appendChild(del);item.appendChild(row1);

    if(sp.type==='move'){
      const row2=document.createElement('div');row2.className='special-row';
      const vl=document.createElement('span');vl.className='special-label';vl.textContent='이동 칸 수';row2.appendChild(vl);
      const vi=document.createElement('input');vi.type='number';vi.className='special-input';vi.value=sp.moveVal;
      vi.onchange=()=>{sp.moveVal=parseInt(vi.value)||0;vi.value=sp.moveVal;updateBadge();renderBoard();renderCellEdit();showSave()};
      row2.appendChild(vi);
      const hint=document.createElement('span');hint.style='font-size:9px;color:var(--text3)';hint.textContent='(+앞 / -뒤)';row2.appendChild(hint);
      item.appendChild(row2);
    }
    list.appendChild(item);
  });
}

function addSpecialCell(){specialCells.push({cellNum:1,type:'move',moveVal:3});renderSpecialList();renderCellEdit()}
function showSave(){const n=document.getElementById('saveNotice');n.classList.add('show');clearTimeout(n._t);n._t=setTimeout(()=>n.classList.remove('show'),1500)}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['play','settings'][i]===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='settings'){renderCellEdit();renderSpecialList()}
}

function permutations(arr){
  if(arr.length<=1)return[[...arr]];
  const res=[];
  for(let i=0;i<arr.length;i++){const rest=[...arr.slice(0,i),...arr.slice(i+1)];for(const p of permutations(rest))res.push([arr[i],...p])}
  return res;
}
function stepForward(pos,steps){return((pos-1+steps)%TOTAL+TOTAL)%TOTAL+1}

function simulate(start,order){
  let pos=start,coins=0;const pathDetails=[];
  for(const d of order){
    const landed=stepForward(pos,d);
    let passBonus=0;
    if(pos!==1){const passed=(landed<pos)||(landed===1);if(passed&&landed!==1)passBonus=500}
    const sp=getSpecial(landed);
    let finalPos=landed,stepCoins=0,teleFrom=null;
    if(sp){
      if(sp.type==='mystery'){stepCoins=0;finalPos=landed;}
      else{
        // 연쇄 특수 칸 처리 (무한루프 방지용 visited)
        teleFrom=landed;
        const visited=new Set([landed]);
        let cur=landed;
        while(true){
          const nsp=getSpecial(cur);
          if(!nsp||nsp.type==='mystery'){stepCoins=(coinVals[cur]||0);break;}
          const next=stepForward(cur,nsp.moveVal);
          if(visited.has(next)){stepCoins=0;break;}
          visited.add(next);
          cur=next;
        }
        finalPos=cur;
      }
    }else{stepCoins=coinVals[landed]||0}
    coins+=stepCoins+passBonus;
    pathDetails.push({from:pos,dice:d,landed,teleFrom,dest:finalPos,coins:stepCoins+passBonus});
    pos=finalPos;
  }
  return{coins,pos,pathDetails};
}

function calculate(){
  const perms=permutations([...chosenDice]);const seen=new Set();const results=[];
  for(const perm of perms){const key=perm.join(',');if(seen.has(key))continue;seen.add(key);results.push({order:perm,...simulate(currentPos,perm)})}
  results.sort((a,b)=>b.coins-a.coins);
  highlightedPath=results[0].pathDetails.map(d=>d.dest);
  // 말을 최적 경로 최종 위치로 애니메이션 이동
  const steps=results[0].pathDetails;
  let delay=0;
  steps.forEach((step,i)=>{
    setTimeout(()=>{
      currentPos=step.dest;
      renderBoard();
      // 말에 moving 클래스 붙여서 팝 애니메이션
      const piece=document.querySelector('.piece');
      if(piece){piece.classList.add('moving');setTimeout(()=>piece&&piece.classList.remove('moving'),350);}
    },delay);
    delay+=420;
  });
  setTimeout(()=>{renderBoard();displayResults(results);},delay);
}

function displayResults(results){
  const sec=document.getElementById('resultsSection');sec.classList.add('visible','pop');setTimeout(()=>sec.classList.remove('pop'),400);
  const best=results[0];
  document.getElementById('bestCoin').textContent=(best.coins>=0?'+':'')+best.coins.toLocaleString()+' 코인';
  document.getElementById('bestOrder').textContent=best.order.map(d=>FACES[d-1]).join('→');
  document.getElementById('bestPos').textContent=best.pos+'번 칸';
  document.getElementById('totalCases').textContent=results.length+'가지';
  const list=document.getElementById('resultList');list.innerHTML='';
  results.forEach((r,i)=>{
    const item=document.createElement('div');item.className='ri';
    const rc=['r1','r2','r3'][i]||'rn';
    const pathStr=r.pathDetails.map(d=>{
      if(d.teleFrom!==null){const sp=getSpecial(d.teleFrom);const s=sp.moveVal>=0?'+':'';return`${d.teleFrom}번(${s}${sp.moveVal}칸→${d.dest}번 +${coinVals[d.dest]||0})`}
      const sp=getSpecial(d.dest);if(sp&&sp.type==='mystery')return`${d.dest}번(?)`;
      return`${d.dest}번(+${coinVals[d.dest]||0})`;
    }).join(' → ');
    item.innerHTML=`<div class="rb ${rc}">${i+1}</div><div class="rbody"><div class="rorder">${r.order.map((d,j)=>`<span>${FACES[d-1]}</span>${j<r.order.length-1?'<span class="rarr">▶</span>':''}`).join('')}<span style="font-size:9px;color:var(--text3);margin-left:3px">(${r.order.join('-')})</span></div><div class="rpath">${pathStr}</div></div><div class="rcoin ${r.coins<0?'neg':''}">${r.coins>=0?'+':''}${r.coins.toLocaleString()}</div>`;
    list.appendChild(item);
  });
  sec.scrollIntoView({behavior:'smooth',block:'start'});
}

renderBoard();renderDice();
</script>
