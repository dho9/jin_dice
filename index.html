<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>진의 신비한 정원</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="maple_dice.css">
</head>
<body>
<div class="app">
<div class="header">
  <div class="ho">✦</div>
  <h1>진의 신비한 정원</h1>
  <div class="sub">주사위 최적 경로 계산기</div>
  <div class="hl"></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('play')">🎲 플레이</button>
  <button class="tab" onclick="switchTab('settings')">⚙️ 보드 설정</button>
</div>

<!-- PLAY TAB -->
<div id="tab-play" class="page active">
  <div class="board-wrap">
    <div class="sh" style="padding:0 0 7px">
      <div class="si">🗺️</div><div class="st">현재 위치 선택</div>
    </div>
    <div class="pos-bar">
      <div><div class="plabel">현재 위치</div><div class="pval" id="posDisplay">1번 칸 (START)</div></div>
      <div class="phint">칸 탭 → 선택</div>
    </div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:rgba(80,216,255,.4)"></div>+이동칸</div>
      <div class="li"><div class="ld" style="background:rgba(240,96,112,.4)"></div>-이동칸</div>
      <div class="li"><div class="ld" style="background:rgba(255,144,64,.4)"></div>?칸</div>
      <div class="li"><div class="ld" style="background:rgba(240,192,96,.1);border:1px solid #c8942a"></div>최적경로</div>
      <div class="li"><div class="ld" style="background:rgba(178,138,248,.22);border:1px solid #b28af8"></div>현재위치</div>
    </div>
    <div class="board-grid" id="boardGrid"></div>
  </div>
  <div class="section">
    <div class="sh"><div class="si">🎲</div><div class="st">주사위 눈 선택</div></div>
    <div class="notice">눈 버튼을 탭하거나, 오른쪽 입력칸에 숫자(1~6)를 직접 입력하세요.</div>
    <div class="dc" id="diceContainer"></div>
  </div>
  <button class="calc-btn" onclick="calculate()">✦ 최적 경로 계산하기 ✦</button>
  <div class="section results-section" id="resultsSection">
    <div class="sh"><div class="si">🏆</div><div class="st">최적 경로 결과</div></div>
    <div class="mgrid">
      <div class="mc hl"><div class="ml">최고 코인 획득</div><div class="mv gold" id="bestCoin">—</div></div>
      <div class="mc"><div class="ml">최적 순서</div><div class="mv sm" id="bestOrder">—</div></div>
      <div class="mc"><div class="ml">도착 칸</div><div class="mv" id="bestPos">—</div></div>
      <div class="mc"><div class="ml">비교 경우의 수</div><div class="mv" id="totalCases">—</div></div>
    </div>
    <div id="resultList"></div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div id="tab-settings" class="page">
  <div class="section">
    <div class="sh"><div class="si">💰</div><div class="st">칸별 코인 보상 수정</div></div>
    <div class="notice">각 칸의 코인 보상을 수정하세요. 특수 칸은 아래에서 설정합니다.</div>
    <div class="cell-edit-grid" id="cellEditGrid"></div>
  </div>
  <div class="section">
    <div class="sh"><div class="si">✨</div><div class="st">특수 칸 설정</div></div>
    <div class="notice">주마다 바뀌는 이동칸·?칸을 여기서 관리하세요.</div>
    <div class="special-list" id="specialList"></div>
    <button class="add-btn" onclick="addSpecialCell()">+ 특수 칸 추가</button>
    <div class="save-notice" id="saveNotice">✓ 저장되었습니다</div>
  </div>
</div>
</div>

<script src="maple_dice.js"></script>
</body>
</html>
